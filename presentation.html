<script>
// Matrix background (lightweight)
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
cv.width=innerWidth;cv.height=innerHeight;
const ch='01',fs=14,cols=Math.floor(cv.width/fs/3),dr=Array(cols).fill(1);
setInterval(()=>{cx.fillStyle='rgba(0,0,0,.07)';cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle='#0f0';cx.font=fs+'px monospace';for(let i=0;i<dr.length;i++){cx.fillText(ch[Math.random()>.5?1:0],i*fs*3,dr[i]*fs);if(dr[i]*fs>cv.height&&Math.random()>.975)dr[i]=0;dr[i]++}},80);
addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight});

// === SLIDE 1: Brute Force ===

  let ipInt=setInterval(()=>{const l=document.createElement('div');l.className='s1-line';l.style.animation='fadeUp .3s forwards';l.textContent=`→ ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}:${ports[Math.floor(Math.random()*ports.length)]}`;right.appendChild(l);if(right.children.length>22)right.removeChild(right.firstChild)},250);

  const pw=document.getElementById('s1-pw'),st=document.getElementById('s1-status'),att=document.getElementById('s1-att'),dots=pw.querySelectorAll('.s1-dot');
  let attempts=0,to;

  const pi=setInterval(()=>{const p=document.createElement('div');p.className='s3-ping';const a=Math.random()*Math.PI*2,d=80+Math.random()*100;p.style.left=`calc(50% + ${Math.cos(a)*d}px)`;p.style.top=`calc(50% + ${Math.sin(a)*d}px)`;pings.appendChild(p);setTimeout(()=>p.classList.add('on'),30);pc++;if(pc>25)clearInterval(pi)},300);
  let min=0;
  const ti=setInterval(()=>{min++;tm.textContent=String(min).padStart(2,'0')+':00';if(min>=13){clearInterval(ti);tm.style.color='#f00';sh.classList.add('down');setTimeout(()=>{fort.classList.add('hit');pings.querySelectorAll('.s3-ping').forEach(p=>p.classList.add('red'))},800);setTimeout(()=>{ct.classList.add('on');let v=0;const vi=setInterval(()=>{v+=Math.floor(1+Math.random()*4);if(v>138)v=138;ct.textContent=v;if(Math.random()>.5){const lk=document.createElement('div');lk.className='s3-leak on';lk.textContent=['TOP SECRET','CLASSIFIED','CVE-2016-****','pwd:a8$k!','db_dump.sql','root@pentagon'][Math.floor(Math.random()*6)];lk.style.left=(30+Math.random()*40)+'%';lk.style.top=(35+Math.random()*20)+'%';leaks.appendChild(lk);setTimeout(()=>lk.remove(),3000)}if(v>=138)clearInterval(vi)},250)},1500)}},1100);
}

    if(c.t==='prompt')ln.innerHTML=`<span class="s4-p">┌──(hacker㉿kali)\n└─$ </span><span class="s4-c">${c.x}</span>`;

// === SLIDE MANAGEMENT ===
const slides=document.querySelectorAll('.slide');
let cur=0,timeLeft=30;
const timerEl=document.getElementById('timer'),progEl=document.getElementById('progress'),snumEl=document.getElementById('snum');

function go(n){
  slides[cur].classList.remove('active');
  cur=n;
  if(cur>=slides.length){cur=0;resetAll()}
  slides[cur].classList.add('active');
  snumEl.textContent=String(cur+1).padStart(2,'0')+'/06';
  timeLeft=30;document.body.style.backgroundColor='#050505';
  if(cur===1)initS2();if(cur===2)initS3();if(cur===3)initS4();if(cur===4)initS5();if(cur===5)initS6();
}

function resetAll(){
  s2Go=s3Go=s4Go=s5Go=s6Go=false;
  // s1
  document.getElementById('s1-shackle').className='s1-shackle';
  document.getElementById('s1-body').className='s1-body';
  document.getElementById('s1-pw').className='s1-pw';
  document.getElementById('s1-status').className='s1-status';
  document.getElementById('s1-burst').className='s1-burst';
  document.getElementById('s1-att').textContent='';
  document.querySelectorAll('.s1-dot').forEach(d=>d.className='s1-dot');
  document.getElementById('s1-left').innerHTML='';
  document.getElementById('s1-right').innerHTML='';
  initS1();
  // s2
  const tk=document.getElementById('s2-tick');tk.className='s2-ticker';tk.textContent='$0';
  document.getElementById('s2-scale').className='s2-scale';
  document.getElementById('s2-pl').className='s2-plate left';
  document.getElementById('s2-pr').className='s2-plate right';
  document.getElementById('s2-mult').className='s2-mult';
  // s3
  document.getElementById('s3-time').textContent='00:00';document.getElementById('s3-time').style.color='#0f0';
  document.getElementById('s3-count').className='s3-count';document.getElementById('s3-count').textContent='0';
  document.getElementById('s3-fort').className='s3-fort';
  document.getElementById('s3-shield').className='s3-shield';
  document.getElementById('s3-pings').innerHTML='';document.getElementById('s3-leaks').innerHTML='';
  // s4
  document.getElementById('s4-body').innerHTML='';document.getElementById('s4-phase').className='s4-phase';
  // s5
  document.getElementById('s5-tree').innerHTML='';document.getElementById('s5-xp').style.width='0%';

  document.getElementById('s6-dl').innerHTML='';document.getElementById('s6-ll').innerHTML='';
  document.getElementById('s6-di').className='s6-icon';document.getElementById('s6-li').className='s6-icon';
  document.getElementById('s6-dark').className='s6-dark';document.getElementById('s6-light').className='s6-light';
  document.getElementById('s6-divider').className='s6-div';document.getElementById('s6-final').className='s6-final';
}

setInterval(()=>{
  timeLeft--;timerEl.textContent=timeLeft;
  const elapsed=30-timeLeft;progEl.style.width=((cur*30+elapsed)/(6*30)*100)+'%';
  // bg color shift
  const r=timeLeft/30;
  if(r>.5)document.body.style.backgroundColor=`rgb(5,${Math.floor(12*(1-r))},5)`;
  else if(r>.2){const t=(.5-r)/.3;document.body.style.backgroundColor=`rgb(${Math.floor(25*t)},${Math.floor(10*t)},0)`}
  else{const t=(.2-r)/.2;document.body.style.backgroundColor=`rgb(${Math.floor(25+20*t)},0,0)`}
  if(timeLeft<=0)go(cur+1);
},1000);

document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(cur+1)});
</script>
