<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethical Hacking - The Unusual Career</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;overflow:hidden;font-family:'Courier New',monospace;height:100vh;width:100vw;transition:background-color 1s}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:.12}

/* HUD */
.hud-timer{position:fixed;top:18px;right:18px;z-index:900;width:64px;height:64px;border-radius:50%;border:2px solid #0f0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);box-shadow:0 0 10px rgba(0,255,0,.4)}
.hud-timer span{color:#0f0;font-size:18px;font-weight:bold;text-shadow:0 0 6px #0f0}
.hud-timer-label{position:fixed;top:86px;right:18px;color:#0f0;font-size:8px;width:64px;text-align:center;opacity:.5;letter-spacing:2px;z-index:900}
.hud-progress{position:fixed;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#0f0,#0ff);z-index:900;box-shadow:0 0 5px #0f0;transition:width .3s}
.hud-num{position:fixed;bottom:14px;right:18px;color:#0f0;font-size:10px;opacity:.4;z-index:900}

/* Start */
.start{position:fixed;inset:0;z-index:1000;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;transition:opacity .7s,visibility .7s}
.start.off{opacity:0;visibility:hidden;pointer-events:none}
.start-glyph{font-size:56px;color:#0f0;text-shadow:0 0 25px rgba(0,255,0,.5);animation:pulse 2s infinite}
.start-btn{padding:14px 44px;border:2px solid #0f0;border-radius:5px;background:rgba(0,255,0,.04);color:#0f0;font:bold 16px 'Courier New',monospace;letter-spacing:3px;cursor:pointer;transition:all .3s}
.start-btn:hover{background:rgba(0,255,0,.12);box-shadow:0 0 20px rgba(0,255,0,.4);transform:scale(1.04)}

/* Slides */
.sl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 1s;pointer-events:none}
.sl.on{opacity:1;pointer-events:all}

/* S0: Breach */
.s0-col{position:absolute;top:8%;width:240px;height:84%;overflow:hidden;opacity:.5}
.s0-left{left:4%}.s0-right{right:4%}
.s0-line{color:#0f0;font-size:10px;line-height:1.9;opacity:0;animation:fadeUp .3s forwards}
.s0-center{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:2}
.s0-lock{position:relative}
.s0-shackle{width:50px;height:42px;border:6px solid #0f0;border-bottom:none;border-radius:28px 28px 0 0;margin:0 auto;transition:all .5s}
.s0-shackle.open{transform:translateY(-12px) rotate(12deg);border-color:#0ff}
.s0-body{width:84px;height:66px;background:#111;border-radius:7px;margin:0 auto;border:2px solid #0f0;box-shadow:0 0 12px rgba(0,255,0,.3);position:relative;transition:all .5s}
.s0-body.open{border-color:#0ff;box-shadow:0 0 35px rgba(0,255,255,.5)}
.s0-hole{width:12px;height:12px;background:#0f0;border-radius:50%;position:absolute;top:16px;left:50%;transform:translateX(-50%);box-shadow:0 0 6px #0f0}
.s0-hole::after{content:'';width:5px;height:16px;background:#0f0;position:absolute;top:10px;left:50%;transform:translateX(-50%);border-radius:0 0 2px 2px}
.s0-pw{width:220px;height:34px;background:#0a0a0a;border:2px solid #333;border-radius:4px;display:flex;align-items:center;padding:0 10px;gap:3px;position:relative}
.s0-pw.fail{border-color:#f00;animation:shake .3s}
.s0-pw.ok{border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,.4)}
.dot{width:8px;height:8px;background:#0f0;border-radius:50%;opacity:0;transition:opacity .1s}
.dot.on{opacity:1}.dot.bad{background:#f00}
.s0-st{position:absolute;right:8px;font-size:9px;color:#f00;opacity:0;transition:opacity .2s}
.s0-st.on{opacity:1}.s0-st.ok{color:#0ff}
.s0-att{color:#555;font-size:9px;letter-spacing:1px}
.s0-burst{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,255,.3),transparent 70%);opacity:0;transform:scale(0);transition:all .7s}
.s0-burst.go{opacity:1;transform:scale(2)}

/* S1: Scale */
.s1-tick{font-size:52px;color:#0f0;text-shadow:0 0 20px rgba(0,255,0,.6);position:absolute;transition:all .5s}
.s1-tick.hide{opacity:0;transform:scale(.4)}
.s1-scale{position:relative;width:500px;height:300px;opacity:0;transition:opacity .8s}
.s1-scale.show{opacity:1}
.s1-beam{position:absolute;width:360px;height:4px;background:#555;border-radius:2px;top:140px;left:70px;transition:transform 1.5s;transform-origin:center center}
.s1-beam.tip{transform:rotate(12deg)}
.s1-pivot{position:absolute;width:14px;height:14px;background:#0f0;border-radius:50%;box-shadow:0 0 10px rgba(0,255,0,.5);top:133px;left:243px;z-index:2}
.s1-stand{position:absolute;width:3px;height:60px;background:#444;top:147px;left:249px;border-radius:2px}
.s1-plate{position:absolute;width:140px;padding:16px;border:2px solid #333;border-radius:9px;text-align:center;background:rgba(0,0,0,.7);transition:all 1.5s}
.s1-left{top:60px;left:20px}
.s1-right{top:60px;right:20px}
.s1-left.tip{border-color:#0f0;top:30px;box-shadow:0 0 18px rgba(0,255,0,.3)}
.s1-right.tip{border-color:#f00;top:100px;box-shadow:0 0 18px rgba(255,0,0,.3)}
.s1-val{font-size:24px;font-weight:bold}
.s1-val.green{color:#0f0;text-shadow:0 0 8px rgba(0,255,0,.5)}
.s1-val.red{color:#f00;text-shadow:0 0 8px rgba(255,0,0,.5)}
.s1-lbl{font-size:9px;color:#777;margin-top:6px;letter-spacing:1px}
.s1-mult{font-size:34px;color:#0ff;text-shadow:0 0 18px rgba(0,255,255,.5);opacity:0;transition:all .7s;position:absolute;bottom:15%}
.s1-mult.show{opacity:1}

/* S2: Pentagon */
.s2-label{position:absolute;top:6%;right:6%;color:#0f0;font-size:9px;opacity:.5;text-align:right;line-height:2;letter-spacing:1px}
.s2-time{position:absolute;bottom:9%;left:50%;transform:translateX(-50%);font-size:40px;color:#0f0;text-shadow:0 0 12px rgba(0,255,0,.5);transition:color .5s}
.s2-radar{position:absolute;width:340px;height:340px;border-radius:50%;border:1px solid rgba(0,255,0,.18);top:50%;left:50%;margin:-170px 0 0 -170px}
.s2-ring{position:absolute;border-radius:50%;border:1px solid rgba(0,255,0,.1);top:50%;left:50%;transform:translate(-50%,-50%)}
.r1{width:75%;height:75%}.r2{width:50%;height:50%}.r3{width:25%;height:25%}
.s2-sweep{position:absolute;width:50%;height:2px;top:50%;left:50%;transform-origin:left;background:linear-gradient(90deg,rgba(0,255,0,.6),transparent);animation:spin 4s linear infinite}
.s2-shield{position:absolute;width:160px;height:160px;border-radius:50%;border:2px solid rgba(0,255,0,.3);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:inset 0 0 12px rgba(0,255,0,.12);transition:all .7s}
.s2-shield.down{border-color:rgba(255,0,0,.4);box-shadow:inset 0 0 12px rgba(255,0,0,.2);animation:flick .2s 4}
.s2-fort{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;transition:filter .8s}
.s2-fort.hit{filter:hue-rotate(300deg) drop-shadow(0 0 12px rgba(255,0,0,.5))}
.s2-ping{position:absolute;width:6px;height:6px;border-radius:50%;background:#0f0;box-shadow:0 0 5px #0f0;opacity:0;transform:scale(0);transition:all .3s}
.s2-ping.on{opacity:1;transform:scale(1)}.s2-ping.red{background:#f00;box-shadow:0 0 5px #f00}
.s2-count{position:absolute;bottom:9%;left:50%;transform:translateX(-50%);font-size:50px;color:#f00;text-shadow:0 0 12px rgba(255,0,0,.4);opacity:0;transition:opacity .4s;margin-bottom:55px}
.s2-count.on{opacity:1}
.s2-leak{position:absolute;font-size:9px;color:#f00;opacity:0}.s2-leak.on{opacity:.7;animation:floatUp 3s forwards}

/* S3: Terminal */
.s3-phase{position:absolute;top:16px;left:16px;padding:4px 11px;border:1px solid #0f0;border-radius:3px;color:#0f0;font-size:9px;letter-spacing:2px;background:rgba(0,12,0,.7);opacity:0;transition:all .3s}
.s3-phase.on{opacity:1}.s3-phase.red{border-color:#f00;color:#f00}.s3-phase.cyan{border-color:#0ff;color:#0ff}
.s3-term{width:660px;height:370px;background:#0b0b0b;border:1px solid #282828;border-radius:9px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.s3-bar{height:28px;background:linear-gradient(#252525,#1a1a1a);display:flex;align-items:center;padding:0 9px;gap:5px;border-bottom:1px solid #111}
.s3-d{display:inline-block;width:9px;height:9px;border-radius:50%}.s3-d.red{background:#ff5f56}.s3-d.yel{background:#ffbd2e}.s3-d.grn{background:#27c93f}
.s3-title{color:#666;font-size:9px;margin:0 auto}
.s3-body{padding:12px;height:calc(100% - 28px);overflow:hidden;position:relative}
.s3-ln{font-size:11px;line-height:1.8;opacity:0;white-space:pre-wrap}.s3-ln.on{opacity:1}
.s3-p{color:#6c6}.s3-c{color:#eee}.s3-o{color:#0f0;opacity:.7}.s3-w{color:#ff0}.s3-s{color:#0ff}.s3-e{color:#f55}

/* S4: Skill Tree */
.s4-heading{position:absolute;top:5%;left:50%;transform:translateX(-50%);color:#0f0;font-size:10px;letter-spacing:3px;opacity:.5}
.s4-tree{position:relative;width:660px;height:400px}
.s4-node{position:absolute;width:52px;height:52px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);opacity:.2;transform:scale(.8);transition:all .5s;font-size:18px}
.s4-node.on{opacity:1;transform:scale(1);border-color:#0f0;box-shadow:0 0 10px rgba(0,255,0,.3)}
.s4-node.t2.on{border-color:#0ff;box-shadow:0 0 10px rgba(0,255,255,.3)}
.s4-node.t3.on{border-color:#f0f;box-shadow:0 0 10px rgba(255,0,255,.3)}
.s4-nlbl{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:1px;white-space:nowrap;opacity:0;transition:opacity .4s;color:#0f0}
.s4-node.on .s4-nlbl{opacity:1}.s4-node.t2.on .s4-nlbl{color:#0ff}.s4-node.t3.on .s4-nlbl{color:#f0f}
.s4-conn{position:absolute;height:2px;background:#1a1a1a;transform-origin:left center;transition:background .4s}
.s4-conn.on{background:#0f0;box-shadow:0 0 3px rgba(0,255,0,.3)}.s4-conn.t2.on{background:#0ff}
.s4-xp{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:260px;height:5px;background:#151515;border-radius:3px;overflow:hidden}
.s4-xp-fill{height:100%;width:0%;background:linear-gradient(90deg,#0f0,#0ff,#f0f);border-radius:3px;transition:width .4s}

/* S5: Choose Path */
.s5-side{width:50%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:all 1.5s}
.s5-dark{background:rgba(20,0,0,.25)}.s5-light{background:rgba(0,20,0,.25)}
.s5-dark.fade{opacity:.12;width:12%}.s5-light.grow{width:88%;background:rgba(0,28,0,.4)}
.s5-divider{position:absolute;left:50%;top:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,#444,transparent);transition:left 1.5s;z-index:3}
.s5-divider.shift{left:12%}
.s5-icon{font-size:46px;opacity:0;transform:translateY(12px);transition:all .6s}
.s5-icon.on{opacity:1;transform:translateY(0)}
.s5-item{font-size:12px;opacity:0;transition:all .4s}.s5-item.on{opacity:1}
.s5-item.dk{color:#f00}.s5-item.lt{color:#0f0}
.s5-final{position:absolute;bottom:8%;right:14%;text-align:center;opacity:0;transition:all .8s}
.s5-final.on{opacity:1}
.s5-big{display:block;font-size:38px;color:#0f0;text-shadow:0 0 16px rgba(0,255,0,.4)}
.s5-sub{font-size:9px;color:#0f0;letter-spacing:2px;opacity:.5}

/* S6: Closing */
.s6-mark{font-size:90px;color:#0f0;text-shadow:0 0 35px rgba(0,255,0,.5);animation:pulse 3s infinite}
.s6-tag{font-size:12px;color:#0f0;letter-spacing:4px;opacity:0;animation:fadeUp 1s 1s forwards;position:absolute;bottom:20%}

/* Keyframes */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes floatUp{to{transform:translateY(-50px);opacity:0}}
</style>
</head>
<body>
<canvas id="bg"></canvas>

  </div>

</div>

<!-- SLIDE 5: Skill Tree -->
<div class="sl" id="sl4">

<!-- SLIDE 6: Choose Path -->
<div class="sl" id="sl5">
  <div id="s5-dark" class="s5-side s5-dark"><div id="s5-di" class="s5-icon">🚔</div><div id="s5-dl" class="s5-list"></div></div>
  <div id="s5-div" class="s5-divider"></div>

  <div id="s5-final" class="s5-final"><span class="s5-big">$220,000+</span><span class="s5-sub">3,500,000 POSITIONS WAITING</span></div>
</div>

<!-- SLIDE 7: Closing -->

<script>
// === MATRIX BACKGROUND ===
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
cv.width=innerWidth;cv.height=innerHeight;
const cols=Math.floor(cv.width/42),dr=Array(cols).fill(1);
setInterval(()=>{cx.fillStyle='rgba(0,0,0,.07)';cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle='#0f0';cx.font='14px monospace';for(let i=0;i<cols;i++){cx.fillText(Math.random()>.5?'1':'0',i*42,dr[i]*14);if(dr[i]*14>cv.height&&Math.random()>.975)dr[i]=0;dr[i]++}},80);
addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight});

// === SLIDE 0: BRUTE FORCE ===
let s0Int1,s0Int2,s0Timeout;
function initS0(){
  const ports=[21,22,80,443,3306,5432,8080,3389,445,8443];
  const left=document.getElementById('s0-left'),right=document.getElementById('s0-right');
  const pw=document.getElementById('s0-pw'),st=document.getElementById('s0-st'),att=document.getElementById('s0-att'),dots=pw.querySelectorAll('.dot');

  s0Int1=setInterval(()=>{const l=document.createElement('div');l.className='s0-line';l.innerHTML=`${ports[Math.floor(Math.random()*ports.length)]}/tcp <span style="color:${Math.random()>.5?'#f00':'#0f0'}">${Math.random()>.5?'closed':'open'}</span>`;left.appendChild(l);if(left.children.length>20)left.removeChild(left.firstChild)},350);

  s0Int2=setInterval(()=>{const l=document.createElement('div');l.className='s0-line';l.textContent=`→ ${[1,2,3,4].map(()=>Math.floor(Math.random()*255)).join('.')}:${ports[Math.floor(Math.random()*ports.length)]}`;right.appendChild(l);if(right.children.length>20)right.removeChild(right.firstChild)},260);

  let attempts=0;
  function tryPw(){
    attempts++;att.textContent='attempts: '+attempts;
    const n=4+Math.floor(Math.random()*5);
    dots.forEach((d,i)=>{d.classList.toggle('on',i<n);d.classList.remove('bad')});
    if(attempts<14){
      setTimeout(()=>{pw.classList.add('fail');st.textContent='DENIED';st.classList.add('on');st.classList.remove('ok');dots.forEach(d=>d.classList.add('bad'));
        setTimeout(()=>{pw.classList.remove('fail');st.classList.remove('on');dots.forEach(d=>{d.classList.remove('on','bad')});s0Timeout=setTimeout(tryPw,450+Math.random()*350)},300)},200);
    }else{
      setTimeout(()=>{pw.classList.add('ok');st.textContent='ACCESS GRANTED';st.classList.add('on','ok');dots.forEach(d=>d.classList.add('on'));document.getElementById('s0-shackle').classList.add('open');document.getElementById('s0-body').classList.add('open');document.getElementById('s0-burst').classList.add('go');clearInterval(s0Int1);clearInterval(s0Int2)},200);
    }
  }
  s0Timeout=setTimeout(tryPw,1800);
}
function resetS0(){
  clearInterval(s0Int1);clearInterval(s0Int2);clearTimeout(s0Timeout);
  document.getElementById('s0-shackle').className='s0-shackle';
  document.getElementById('s0-body').className='s0-body';
  document.getElementById('s0-pw').className='s0-pw';
  document.getElementById('s0-st').className='s0-st';
  document.getElementById('s0-burst').className='s0-burst';
  document.getElementById('s0-att').textContent='';
  document.querySelectorAll('#sl0 .dot').forEach(d=>d.className='dot');
  document.getElementById('s0-left').innerHTML='';
  document.getElementById('s0-right').innerHTML='';
}


// === SLIDE 1: MONEY SCALE ===
let s1Timer;
function initS1(){
  const tick=document.getElementById('s1-tick'),scale=document.getElementById('s1-scale'),pl=document.getElementById('s1-pl'),pr=document.getElementById('s1-pr'),mult=document.getElementById('s1-mult'),beam=document.getElementById('s1-beam');
  let v=0;

let s3Timeout;
function initS3(){
  const body=document.getElementById('s3-body'),phase=document.getElementById('s3-phase');
  const cmds=[
    {ph:'RECON',cl:'',t:'p',x:'nmap -sV -O 192.168.1.105'},

    {t:'w',x:'+ /admin: Directory indexing found'},
    {t:'w',x:'+ /login.php: SQL injection possible'},
    {ph:'EXPLOIT',cl:'red',t:'p',x:"sqlmap -u 'target/login?id=1' --dbs"},
    {t:'o',x:'[*] testing connection...'},
    {t:'e',x:'[!] parameter id is vulnerable'},
    {t:'o',x:'[*] admin_db  [*] users  [*] credentials'},

    {t:'s',x:'[✓] Severity: 3 Critical, 5 High, 6 Medium'},
    {t:'s',x:'[✓] Sent to: security@company.com'},
  ];
  let i=0;
  function next(){
    if(i>=cmds.length)return;const c=cmds[i];
    if(c.ph){phase.className='s3-phase on'+(c.cl?' '+c.cl:'');phase.textContent=c.ph}
    const ln=document.createElement('div');ln.className='s3-ln on';
    if(c.t==='p')ln.innerHTML=`<span class="s3-p">└─$ </span><span class="s3-c">${c.x}</span>`;
    else{const m={o:'s3-o',w:'s3-w',e:'s3-e',s:'s3-s'};ln.innerHTML=`<span class="${m[c.t]}">${c.x}</span>`}
    body.appendChild(ln);body.scrollTop=body.scrollHeight;i++;
    s3Timeout=setTimeout(next,c.t==='p'?1500:450+Math.random()*250);
  }
  next();
}

function resetS6(){}


// === SLIDE MANAGEMENT ===
const slides=document.querySelectorAll('.sl');
const TOTAL=slides.length;
let cur=0,timeLeft=30,running=false;
const timerEl=document.getElementById('timer'),progEl=document.getElementById('progress'),snumEl=document.getElementById('snum');
const resets=[resetS0,resetS1,resetS2,resetS3,resetS4,resetS5,resetS6];
const inits=[initS0,initS1,initS2,initS3,initS4,initS5,null];

// Start button
document.getElementById('start-btn').onclick=()=>{
  document.getElementById('start').classList.add('off');
  slides[0].classList.add('on');
  running=true;
  initS0();
};

function go(n){
  if(n<0)n=0;
  if(n>=TOTAL)n=0;
  // Reset current slide (stop its animations)
  resets[cur]();
  slides[cur].classList.remove('on');
  cur=n;
  // Reset target slide (clean DOM)
  resets[cur]();
  slides[cur].classList.add('on');
  snumEl.textContent=String(cur+1).padStart(2,'0')+'/0'+TOTAL;
  timeLeft=30;
  document.body.style.backgroundColor='#050505';
  // Start target slide animation
  if(inits[cur])inits[cur]();
}

// Timer
setInterval(()=>{
  if(!running)return;
  timeLeft--;
  if(timeLeft<0)timeLeft=0;
  timerEl.textContent=timeLeft;
  progEl.style.width=((cur*30+(30-timeLeft))/(TOTAL*30)*100)+'%';
  // Background color shift
  const r=timeLeft/30;
  if(r>.5)document.body.style.backgroundColor=`rgb(5,${Math.floor(10*(1-r))},5)`;
  else if(r>.2){const t=(.5-r)/.3;document.body.style.backgroundColor=`rgb(${Math.floor(22*t)},${Math.floor(8*t)},0)`}
  else{const t=(.2-r)/.2;document.body.style.backgroundColor=`rgb(${Math.floor(22+18*t)},0,0)`}
  if(timeLeft<=0)go(cur+1);
},1000);

// Keyboard
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowRight'||e.key===' ')go(cur+1);
  if(e.key==='ArrowLeft')go(cur-1);
});
